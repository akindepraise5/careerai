<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerPath AI | Defined Trajectory</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React Icons (CDN exposes as 'lucide') -->
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@100;300;400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .font-serif {
            font-family: 'Instrument Serif', serif;
        }

        .selection\:bg-black *::selection {
            background-color: black;
            color: white;
        }

        /* Custom animation for progress bar */
        .progress-transition {
            transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }
    </style>
</head>

<body class="bg-white text-zinc-900 selection:bg-black selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        {
            const { useState, useEffect } = React;

            // Helper to safely get icons from the CDN global 'lucide'
            const getIcon = (name) => {
                const lib = window.lucide || {};
                const icon = lib[name];
                // Return a functional component that returns null if the icon isn't found
                return icon || (() => null);
            };

            const ChevronRight = getIcon('ChevronRight');
            const Target = getIcon('Target');
            const Briefcase = getIcon('Briefcase');
            const Users = getIcon('Users');
            const Lightbulb = getIcon('Lightbulb');
            const CheckCircle2 = getIcon('CheckCircle2');
            const ArrowRight = getIcon('ArrowRight');
            const BarChart3 = getIcon('BarChart3');
            const Compass = getIcon('Compass');
            const ClipboardList = getIcon('ClipboardList');
            const MessageSquare = getIcon('MessageSquare');
            const Mail = getIcon('Mail');
            const Phone = getIcon('Phone');
            const MapPin = getIcon('MapPin');
            const Menu = getIcon('Menu');
            const X = getIcon('X');
            const ArrowUpRight = getIcon('ArrowUpRight');
            const Sparkles = getIcon('Sparkles');
            const Zap = getIcon('Zap');

            // --- Assessment Data ---
            const QUESTIONS = [
                { id: 1, text: "I find satisfaction in the precision of building or repairing mechanical systems.", category: "Realistic" },
                { id: 2, text: "I am naturally drawn to investigating complex scientific or mathematical theories.", category: "Investigative" },
                { id: 3, text: "I thrive when I can express abstract concepts through artistic mediums.", category: "Artistic" },
                { id: 4, text: "I am deeply motivated by the opportunity to mentor or support others.", category: "Social" },
                { id: 5, text: "I excel at strategically influencing others to achieve high-level business goals.", category: "Enterprising" },
                { id: 6, text: "I prefer environments that value meticulous organization and data integrity.", category: "Conventional" },
                { id: 7, text: "Operating complex machinery or tools feels intuitive to me.", category: "Realistic" },
                { id: 8, text: "Analyzing raw data to find hidden patterns is a strength of mine.", category: "Investigative" },
                { id: 9, text: "The challenge of performing or presenting to an audience excites me.", category: "Artistic" },
                { id: 10, text: "I am passionate about transferring knowledge through teaching.", category: "Social" },
                { id: 11, text: "I have a natural aptitude for negotiation and high-stakes decision making.", category: "Enterprising" },
                { id: 12, text: "I find peace in creating structured systems and detailed records.", category: "Conventional" },
            ];

            const CAREER_MAP = {
                Realistic: {
                    title: "The Architect of Action",
                    label: "Realistic",
                    description: "You possess a pragmatic brilliance, excelling in environments that demand physical precision and tangible results. You don't just plan; you execute.",
                    careers: ["Systems Engineer", "Sustainable Architect", "Aerospace Specialist", "Master Craftsperson", "Industrial Designer"],
                    color: "bg-black",
                },
                Investigative: {
                    title: "The Analytical Visionary",
                    label: "Investigative",
                    description: "Your mind is a high-performance engine for logic. You seek the 'why' behind the 'how', thriving in the pursuit of intellectual discovery and complex problem-solving.",
                    careers: ["Quantum Analyst", "Biomedical Researcher", "Economic Strategist", "Software Architect", "Forensic Scientist"],
                    color: "bg-zinc-900",
                },
                Artistic: {
                    title: "The Creative Vanguard",
                    label: "Artistic",
                    description: "Unbound by convention, you see the world through a lens of possibility. You translate abstract emotion into resonant experiences and innovative design.",
                    careers: ["Creative Director", "Experience Designer", "Editorial Stylist", "Brand Strategist", "Concept Artist"],
                    color: "bg-zinc-800",
                },
                Social: {
                    title: "The Human Strategist",
                    label: "Social",
                    description: "You are the connective tissue of society. Your high emotional intelligence allows you to empower, heal, and lead people toward their highest potential.",
                    careers: ["Executive Coach", "Diplomatic Liaison", "Organizational Psychologist", "Wellness Director", "Social Innovation Lead"],
                    color: "bg-zinc-950",
                },
                Enterprising: {
                    title: "The Catalyst for Growth",
                    label: "Enterprising",
                    description: "You are a natural-born leader with a keen eye for opportunity. Your ambition is matched only by your ability to inspire confidence and drive large-scale success.",
                    careers: ["Venture Partner", "Chief Executive", "Growth Strategist", "Crisis Consultant", "Market Disruptor"],
                    color: "bg-neutral-900",
                },
                Conventional: {
                    title: "The Precision Optimizer",
                    label: "Conventional",
                    description: "You bring order to chaos. Your ability to design and maintain flawless systems is the foundation upon which the most successful organizations are built.",
                    careers: ["Risk Manager", "Financial Controller", "Operations Director", "Data Governance Officer", "Supply Chain Strategist"],
                    color: "bg-slate-950",
                }
            };

            const App = () => {
                const [view, setView] = useState('home');
                const [currentStep, setCurrentStep] = useState(0);
                const [answers, setAnswers] = useState({});
                const [finalResult, setFinalResult] = useState(null);
                const [isMenuOpen, setIsMenuOpen] = useState(false);

                const handleAnswer = (score) => {
                    const question = QUESTIONS[currentStep];
                    const newAnswers = { ...answers, [question.id]: { category: question.category, score } };
                    setAnswers(newAnswers);

                    if (currentStep < QUESTIONS.length - 1) {
                        setCurrentStep(currentStep + 1);
                    } else {
                        calculateResults(newAnswers);
                    }
                };

                const calculateResults = (allAnswers) => {
                    const scores = { Realistic: 0, Investigative: 0, Artistic: 0, Social: 0, Enterprising: 0, Conventional: 0 };
                    Object.values(allAnswers).forEach(ans => { scores[ans.category] += ans.score; });
                    const topCategory = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                    setFinalResult({ category: topCategory, scores });
                    window.scrollTo(0, 0);
                    setView('results');
                };

                const resetAssessment = () => {
                    setAnswers({});
                    setCurrentStep(0);
                    setFinalResult(null);
                    setView('assessment');
                    window.scrollTo(0, 0);
                };

                const Navbar = () => (
                    <nav className="fixed w-full z-50 transition-all duration-500">
                        <div className="max-w-7xl mx-auto px-6 lg:px-12 py-6">
                            <div className="flex justify-between items-center bg-white/80 backdrop-blur-xl border border-zinc-100 shadow-2xl shadow-black/5 rounded-2xl px-8 h-16">
                                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setView('home')}>
                                    <div className="bg-black p-2 rounded-lg group-hover:bg-zinc-800 transition-colors duration-500">
                                        <Target className="text-white w-5 h-5" />
                                    </div>
                                    <span className="text-xl font-bold tracking-tighter text-black uppercase">
                                        CareerPath<span className="text-zinc-400 font-serif lowercase italic">.ai</span>
                                    </span>
                                </div>

                                <div className="hidden md:flex items-center space-x-10">
                                    <a href="#" className="text-[10px] font-bold text-zinc-400 hover:text-black transition-colors uppercase tracking-[0.2em]">Methodology</a>
                                    <a href="#" className="text-[10px] font-bold text-zinc-400 hover:text-black transition-colors uppercase tracking-[0.2em]">Consultants</a>
                                    <button
                                        onClick={() => setView('assessment')}
                                        className="bg-black text-white px-6 py-2 rounded-xl text-xs font-bold hover:bg-zinc-800 transition-all duration-300 uppercase tracking-widest"
                                    >
                                        Analyze Career
                                    </button>
                                </div>

                                <div className="md:hidden">
                                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 text-black">
                                        {isMenuOpen ? <X /> : <Menu />}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {isMenuOpen && (
                            <div className="md:hidden bg-white p-8 space-y-6 animate-in slide-in-from-top duration-300 border-b border-zinc-100 shadow-2xl">
                                <a href="#" className="block text-sm font-bold tracking-widest text-black uppercase">Methodology</a>
                                <a href="#" className="block text-sm font-bold tracking-widest text-black uppercase">Consultants</a>
                                <button
                                    onClick={() => { setView('assessment'); setIsMenuOpen(false); }}
                                    className="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs"
                                >
                                    Start Assessment
                                </button>
                            </div>
                        )}
                    </nav>
                );

                const HomeView = () => (
                    <div className="bg-white">
                        <section className="relative pt-48 pb-32 overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40">
                                <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-zinc-100 rounded-full blur-[120px]"></div>
                                <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-zinc-50 rounded-full blur-[120px]"></div>
                            </div>

                            <div className="max-w-7xl mx-auto px-6 lg:px-12 relative z-10">
                                <div className="max-w-5xl">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 bg-zinc-50 ring-1 ring-zinc-200 rounded-full mb-10">
                                        <Sparkles size={14} className="text-black" />
                                        <span className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">The Modern Standard</span>
                                    </div>
                                    <h1 className="text-7xl lg:text-[10rem] font-serif text-black leading-[0.85] mb-12 tracking-tighter">
                                        Define your <br />
                                        <span className="italic font-light">trajectory.</span>
                                    </h1>
                                    <p className="text-xl lg:text-2xl text-zinc-500 mb-16 max-w-2xl leading-relaxed font-light">
                                        CareerPath.ai curates professional destinies through scientific diagnostics and elite human insight.
                                    </p>
                                    <div className="flex flex-wrap gap-8">
                                        <button
                                            onClick={() => setView('assessment')}
                                            className="group relative px-12 py-6 bg-black text-white rounded-full font-bold text-sm uppercase tracking-[0.2em] overflow-hidden transition-all hover:scale-[1.02] active:scale-[0.98]"
                                        >
                                            <span className="relative z-10 flex items-center gap-3">
                                                Begin Diagnostic <ArrowRight size={18} className="group-hover:translate-x-1 transition-transform" />
                                            </span>
                                            <div className="absolute inset-0 bg-zinc-800 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                        </button>
                                        <button className="px-12 py-6 bg-white text-black border border-zinc-200 rounded-full font-bold text-sm uppercase tracking-[0.2em] hover:bg-zinc-50 transition-all">
                                            Learn More
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-24 max-w-[1400px] mx-auto px-6 h-[400px] lg:h-[700px] overflow-hidden rounded-[3rem] shadow-2xl relative group grayscale contrast-[1.1]">
                                <div className="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors duration-700 z-10"></div>
                                <img
                                    src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1600"
                                    className="w-full h-full object-cover scale-105 group-hover:scale-100 transition-transform duration-1000"
                                    alt="Executive Office"
                                    onError={(e) => { e.target.src = 'https://via.placeholder.com/1600x900?text=Executive+Office'; }}
                                />
                                <div className="absolute bottom-16 left-16 z-20 flex gap-16 text-white mix-blend-difference">
                                    <div>
                                        <p className="text-5xl font-serif italic mb-2">100k+</p>
                                        <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-70">Assessments</p>
                                    </div>
                                    <div>
                                        <p className="text-5xl font-serif italic mb-2">94%</p>
                                        <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-70">Success Rate</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section className="py-32 bg-white">
                            <div className="max-w-7xl mx-auto px-6 lg:px-12">
                                <div className="flex flex-col lg:flex-row lg:items-end justify-between mb-24 gap-8 border-b border-zinc-100 pb-16">
                                    <div className="max-w-2xl">
                                        <h2 className="text-xs font-black uppercase tracking-[0.4em] text-zinc-400 mb-8">Expertise</h2>
                                        <p className="text-5xl lg:text-7xl font-serif text-black leading-tight tracking-tighter">
                                            A holistic approach to <span className="italic font-light">mastery</span>.
                                        </p>
                                    </div>
                                    <div className="lg:w-1/3">
                                        <p className="text-zinc-500 leading-relaxed font-light">Tailored for individuals who demand high-fidelity career growth and unconventional results.</p>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-0 ring-1 ring-zinc-100 rounded-[3rem] overflow-hidden">
                                    {[
                                        { icon: <ClipboardList />, title: "Diagnostics", desc: "Scientific psychometric testing that uncovers latent career potential." },
                                        { icon: <Target />, title: "Roadmapping", desc: "Custom-built trajectories designed to navigate the corporate landscape." },
                                        { icon: <MessageSquare />, title: "Coaching", desc: "One-on-one mentorship with industry leaders and certified specialists." },
                                        { icon: <Briefcase />, title: "Brand Refinement", desc: "Elevating your personal presence through elite professional design." },
                                        { icon: <Users />, title: "Network Access", desc: "Curated introductions to high-growth firms and executive circles." },
                                        { icon: <Zap />, title: "Negotiation", desc: "Specialized training for high-stakes interviews and salary capture." }
                                    ].map((s, i) => (
                                        <div key={i} className="p-16 border-b border-r border-zinc-100 hover:bg-zinc-50 transition-colors group">
                                            <div className="mb-10 text-black group-hover:translate-x-2 transition-transform duration-500">{s.icon}</div>
                                            <h3 className="text-2xl font-serif mb-6 text-black uppercase tracking-tight">{s.title}</h3>
                                            <p className="text-zinc-500 font-light leading-relaxed mb-10">{s.desc}</p>
                                            <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.3em] text-zinc-300 group-hover:text-black transition-colors">
                                                Explore <ArrowUpRight size={14} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <footer className="bg-black text-white pt-32 pb-16 relative overflow-hidden">
                            <div className="max-w-7xl mx-auto px-6 lg:px-12 relative z-10">
                                <div className="grid lg:grid-cols-2 gap-32 mb-32">
                                    <div>
                                        <h2 className="text-6xl lg:text-8xl font-serif italic mb-16 leading-[0.9]">Redefine your <br />destiny.</h2>
                                        <div className="flex gap-6">
                                            <button onClick={() => setView('assessment')} className="px-10 py-5 bg-white text-black rounded-full font-bold uppercase tracking-widest text-xs hover:bg-zinc-200 transition-colors">Start Assessment</button>
                                            <button className="px-10 py-5 border border-zinc-800 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-zinc-900 transition-colors">Connect</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-16">
                                        <div>
                                            <h4 className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-600 mb-10">Navigation</h4>
                                            <ul className="space-y-6 text-sm font-light text-zinc-400">
                                                <li className="hover:text-white transition-colors cursor-pointer tracking-widest uppercase text-xs">Diagnostics</li>
                                                <li className="hover:text-white transition-colors cursor-pointer tracking-widest uppercase text-xs">Boutique</li>
                                                <li className="hover:text-white transition-colors cursor-pointer tracking-widest uppercase text-xs">Methodology</li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h4 className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-600 mb-10">Legal</h4>
                                            <ul className="space-y-6 text-sm font-light text-zinc-400">
                                                <li className="hover:text-white transition-colors cursor-pointer tracking-widest uppercase text-xs">Privacy</li>
                                                <li className="hover:text-white transition-colors cursor-pointer tracking-widest uppercase text-xs">Terms</li>
                                                <li className="hover:text-white transition-colors cursor-pointer tracking-widest uppercase text-xs">Ethics</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col md:flex-row justify-between items-center pt-16 border-t border-zinc-900 text-zinc-600 text-[10px] tracking-[0.4em] font-black uppercase">

                                    <div className="flex gap-16 mt-8 md:mt-0">

                                        <span>Substack</span>
                                    </div>
                                </div>
                            </div>
                        </footer>
                    </div>
                );

                const AssessmentView = () => {
                    const progress = ((currentStep + 1) / QUESTIONS.length) * 100;
                    const q = QUESTIONS[currentStep];

                    return (
                        <div className="min-h-screen bg-white pt-48 pb-20 px-6">
                            <div className="max-w-3xl mx-auto">
                                <div className="mb-24">
                                    <div className="flex justify-between items-end mb-6">
                                        <span className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-400">Section 01 / Q.{currentStep + 1}</span>
                                        <span className="font-serif italic text-black text-3xl">{Math.round(progress)}%</span>
                                    </div>
                                    <div className="w-full bg-zinc-50 h-[1px] rounded-full overflow-hidden">
                                        <div className="h-full bg-black progress-transition" style={{ width: `${progress}%` }}></div>
                                    </div>
                                </div>

                                <div className="space-y-20 animate-in fade-in slide-in-from-bottom-8 duration-700">
                                    <div className="text-center">
                                        <h3 className="text-4xl md:text-6xl font-serif text-black leading-tight tracking-tighter">
                                            "{q.text}"
                                        </h3>
                                    </div>

                                    <div className="grid grid-cols-1 gap-4 max-w-xl mx-auto">
                                        {[
                                            { label: "Absolutely", value: 5 },
                                            { label: "Somewhat", value: 4 },
                                            { label: "Neutral", value: 3 },
                                            { label: "Rarely", value: 2 },
                                            { label: "Never", value: 1 },
                                        ].map((opt) => (
                                            <button
                                                key={opt.value}
                                                onClick={() => handleAnswer(opt.value)}
                                                className="group flex items-center justify-between p-8 bg-white border border-zinc-100 rounded-3xl hover:border-black hover:scale-[1.01] transition-all duration-500"
                                            >
                                                <span className="text-xs font-black uppercase tracking-[0.3em] text-zinc-400 group-hover:text-black transition-colors">{opt.label}</span>
                                                <div className="w-10 h-10 rounded-full border border-zinc-100 group-hover:border-black flex items-center justify-center transition-colors">
                                                    <div className="w-2 h-2 rounded-full bg-black scale-0 group-hover:scale-100 transition-transform duration-500"></div>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                };

                const ResultsView = () => {
                    const res = CAREER_MAP[finalResult.category];

                    return (
                        <div className="min-h-screen bg-[#FAF9F6] pt-48 pb-32 px-6">
                            <div className="max-w-6xl mx-auto">
                                <div className="bg-white rounded-[3.5rem] shadow-2xl shadow-black/5 overflow-hidden flex flex-col lg:flex-row mb-24 ring-1 ring-zinc-100">
                                    <div className={`lg:w-1/2 p-16 lg:p-24 text-white ${res.color} flex flex-col justify-between`}>
                                        <div>
                                            <div className="flex items-center gap-4 mb-16">
                                                <div className="bg-white/10 p-2 rounded-lg backdrop-blur-xl border border-white/10">
                                                    <Sparkles className="w-5 h-5 text-white" />
                                                </div>
                                                <span className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500">Executive Profile</span>
                                            </div>
                                            <h1 className="text-6xl md:text-8xl font-serif italic leading-[0.85] mb-12 tracking-tighter">{res.title}</h1>
                                            <p className="text-xl text-zinc-400 leading-relaxed font-light mb-16">
                                                {res.description}
                                            </p>
                                        </div>
                                        <div className="flex items-center gap-4 text-[10px] font-black uppercase tracking-[0.4em] text-zinc-600">
                                            Archetype ID: <span className="text-white">{res.label}</span>
                                        </div>
                                    </div>

                                    <div className="lg:w-1/2 p-16 lg:p-24">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-300 mb-16">Strategic Pathways</h3>
                                        <div className="space-y-6">
                                            {res.careers.map((c, i) => (
                                                <div key={i} className="group p-8 bg-zinc-50 rounded-3xl border border-zinc-100 flex items-center justify-between hover:bg-black hover:text-white hover:shadow-2xl transition-all duration-500 cursor-pointer">
                                                    <span className="text-2xl font-serif tracking-tight">{c}</span>
                                                    <ArrowUpRight className="text-zinc-300 group-hover:text-white transition-all duration-500" size={24} />
                                                </div>
                                            ))}

                                    </div>
                                </div>

                                <div className="grid lg:grid-cols-3 gap-16 items-start">

                                            <h3 className="text-xs font-black uppercase tracking-[0.4em] text-zinc-300 mb-16 italic">Core Competency Matrix</h3>
                                            <div className="space-y-12">
                                                {Object.entries(finalResult.scores).map(([cat, score]) => (
                                                    <div key={cat}>

                                                        </div>
                                                        <div className="w-full bg-zinc-50 h-[1px] rounded-full overflow-hidden">
                                                            <div
                                                                className={`h-full ${cat === finalResult.category ? 'bg-black' : 'bg-zinc-200'} progress-transition`}
                                                                style={{ width: `${(score / 10) * 100}%` }}
                                                            ></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-black p-16 rounded-[3.5rem] text-white space-y-12 relative overflow-hidden">
                                        <h3 className="text-3xl font-serif italic relative z-10 leading-tight">Next Strategic <br />Initiatives</h3>
                                        <ul className="space-y-10 relative z-10">
                                            {[
                                                { step: "01", text: "Acquire Executive Dossier" },
                                                { step: "02", text: "Reserve Private Consultation" },
                                                { step: "03", text: "View Market Analytics" }
                                            ].map((s, i) => (
                                                <li key={i} className="flex gap-8 group cursor-pointer">
                                                    <span className="text-zinc-700 font-black text-xs tracking-tighter">{s.step}</span>
                                                    <span className="text-zinc-500 group-hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">{s.text}</span>
                                                </li>
                                            ))}
                                        </ul>
                                        <button
                                            onClick={resetAssessment}
                                            className="w-full py-6 border border-zinc-800 rounded-full text-xs font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-500"
                                        >
                                            Retake Diagnostic
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="min-h-screen">
                        <Navbar />
                        <main>
                            {view === 'home' && <HomeView />}
                            {view === 'assessment' && <AssessmentView />}
                            {view === 'results' && <ResultsView />}
                        </main>

                        {view !== 'home' && (
                            <button
                                onClick={() => setView('home')}
                                className="fixed bottom-12 right-12 bg-black text-white w-20 h-20 rounded-full shadow-2xl flex items-center justify-center border border-zinc-800 hover:scale-110 transition-transform z-50 group"
                            >
                                <Compass className="group-hover:rotate-180 transition-transform duration-1000 w-8 h-8" />
                            </button>
                        )}
                    </div>
                );
            };

            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        }
    </script>
</body>

</html>
